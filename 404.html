<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard-BookSore</title>
    <script type="text/javascript">
      var segmentCount = 1;
      var l = window.location;
      var p = l.pathname.split('/');
      
      var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + p[1] + '/?p=/' + p.slice(segmentCount + 1).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') + l.hash;
        
      window.location.replace(redirect);
    </script>
  </head>
  <body>
  </body>
</html>
